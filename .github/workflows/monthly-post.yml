name: Monthly ListenBrainz → Bluesky / Mastodon

on:
  schedule:
    # The 14th of every month at 15:00 UTC.
    # ListenBrainz does a full stats reimport on the 1st and 15th of the
    # month (see https://listenbrainz.readthedocs.io/en/latest/general/data-update-intervals.html).
    # We originally ran on the 4th (3 days after the 1st reimport) but in
    # July 2026 the reimport took ~12 days to process, so the staleness guard
    # fired and skipped the post entirely. The 14th gives 13+ days of buffer
    # and also sits just before the 15th reimport, which may itself re-process
    # the previous month's stats and help. (GitHub cron is best-effort and
    # may run a bit late; that's fine for a monthly job.)
    - cron: "0 15 14 * *"

  # Allow manual runs from the Actions tab, with an optional dry-run preview.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the post without sending it"
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Chromium for the image render (with OS deps for the CI runner).
      - run: npx playwright install --with-deps chromium

      - name: Post monthly top albums
        run: node src/index.mjs
        env:
          LISTENBRAINZ_USERNAME: ${{ secrets.LISTENBRAINZ_USERNAME }}
          # Bluesky (optional)
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          # Mastodon (optional)
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '' }}
