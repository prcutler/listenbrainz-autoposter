name: Weekly ListenBrainz → Bluesky / Mastodon

on:
  schedule:
    # Every Wednesday at 15:00 UTC.
    # ListenBrainz's "week" range is last week's completed Mon–Sun, but its
    # stats rollover lag varies — on 2026-06-23 the "week" range still showed
    # the week before last as of Tuesday 16:07 UTC, and only flipped over to
    # the correct week sometime before 19:15 UTC that day. Running on
    # Wednesday gives a full extra day of buffer. (GitHub cron is best-effort
    # and may run a few minutes late; that's fine for a weekly job.)
    - cron: "0 15 * * 3"

  # Allow manual runs from the Actions tab, with an optional dry-run preview.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the post without sending it"
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Chromium for the image render (with OS deps for the CI runner).
      - run: npx playwright install --with-deps chromium

      - name: Post weekly top albums
        run: node src/index.mjs
        env:
          LISTENBRAINZ_USERNAME: ${{ secrets.LISTENBRAINZ_USERNAME }}
          # Bluesky (optional)
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          # Mastodon (optional)
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '' }}
